# Read the Docs build config.
#
# autodoc (MCP tools) and sphinx-click (CLI) both import the axiom_graph
# package, so we install the base package (`--with docs`) -- but WITHOUT any
# optional extras. The heavy/deprecated extras (semantic, viz, tree-sitter)
# live in [tool.poetry.extras] and are mocked via autodoc_mock_imports in
# userdocs/conf.py, so the import never needs them.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - pip install poetry
      - poetry config virtualenvs.create false
      - poetry install --with docs

sphinx:
  configuration: userdocs/conf.py
